<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2026 官网情报追踪 - 筛选增强版</title>
    <style>
        :root { --mc: #00f2ff; --val: #ff4655; --bg: #0d1117; }
        body { background: var(--bg); color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 20px; }
        header { display: flex; flex-direction: column; border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 15px; }
        
        /* 筛选按钮样式 */
        .filter-bar { display: flex; gap: 10px; }
        .btn { padding: 6px 15px; border-radius: 6px; cursor: pointer; border: 1px solid #444; background: #21262d; color: white; transition: 0.2s; }
        .btn:hover { border-color: #8b949e; }
        .btn.active { background: #30363d; border-color: white; font-weight: bold; }
        .btn-refresh { background: #238636; border: none; font-weight: bold; margin-left: auto; }
        
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 8px; text-decoration: none; color: inherit; border-left: 4px solid #30363d; display: block; transition: 0.2s; }
        .card:hover { transform: translateY(-3px); background: #1c2128; }
        .card[data-game="鸣潮"] { border-left-color: var(--mc); }
        .card[data-game="无畏契约"] { border-left-color: var(--val); }
        .title { font-size: 14px; font-weight: bold; margin-bottom: 10px; height: 40px; overflow: hidden; line-height: 1.4; }
        .time { font-size: 11px; color: #8b949e; }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div>
            <h2 style="margin:0;">📡 官网情报监控 (2026)</h2>
            <small id="status">正在同步 2026 官网数据...</small>
        </div>
        <button class="btn btn-refresh" onclick="manualRefresh()">立即刷新</button>
    </div>
    
    <div class="filter-bar">
        <button class="btn active" id="btn-all" onclick="filterGame('全部')">全部</button>
        <button class="btn" id="btn-mc" onclick="filterGame('鸣潮')">只看鸣潮</button>
        <button class="btn" id="btn-val" onclick="filterGame('无畏契约')">只看无畏契约</button>
    </div>
</header>

<div class="news-grid" id="container">加载中...</div>

<script>
    let allNews = []; // 存储所有 2026 年的数据

    async function fetchFromOfficial() {
        const status = document.getElementById('status');
        const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
        
        try {
            // 使用精准搜索源确保获取 2026 动态
            const searchUrls = [
                'https://news.google.com/rss/search?q=Wuthering+Waves+official+after:2026-01-01',
                'https://news.google.com/rss/search?q=VALORANT+news+after:2026-01-01'
            ];

            let tempNews = [];
            for (let url of searchUrls) {
                const res = await fetch(proxy + encodeURIComponent(url));
                const data = await res.json();
                if (data.items) {
                    data.items.forEach(item => {
                        let game = item.title.toLowerCase().includes('wuthering') ? '鸣潮' : '无畏契约';
                        tempNews.push({
                            title: item.title.split(' - ')[0],
                            link: item.link,
                            date: new Date(item.pubDate),
                            game: game
                        });
                    });
                }
            }
            // 排序
            allNews = tempNews.sort((a, b) => b.date - a.date);
            render(allNews);
            status.innerText = "最后更新: " + new Date().toLocaleTimeString();
        } catch (e) {
            status.innerText = "同步出错";
        }
    }

    function render(data) {
        const container = document.getElementById('container');
        if (data.length === 0) {
            container.innerHTML = "<p>2026 年暂无动态。</p>";
            return;
        }
        container.innerHTML = data.map(n => `
            <a href="${n.link}" target="_blank" class="card" data-game="${n.game}">
                <div style="color:${n.game==='鸣潮'?'var(--mc)':'var(--val)'};font-size:10px;margin-bottom:5px;font-weight:bold;">${n.game}</div>
                <div class="title">${n.title}</div>
                <div class="time">${n.date.toLocaleString()}</div>
            </a>
        `).join('');
    }

    // 筛选逻辑
    function filterGame(type) {
        // 切换按钮高亮
        document.querySelectorAll('.filter-bar .btn').forEach(b => b.classList.remove('active'));
        if (type === '全部') {
            document.getElementById('btn-all').classList.add('active');
            render(allNews);
        } else {
            const btnId = type === '鸣潮' ? 'btn-mc' : 'btn-val';
            document.getElementById(btnId).classList.add('active');
            const filtered = allNews.filter(n => n.game === type);
            render(filtered);
        }
    }

    function manualRefresh() { fetchFromOfficial(); }
    
    fetchFromOfficial();
    setInterval(fetchFromOfficial, 1800000); // 30分钟自刷
</script>
</body>
</html>
