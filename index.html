<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2026 官网全能监控站</title>
    <style>
        :root { --mc: #00f2ff; --val: #ff4655; --hsr: #d2aa6d; --bg: #0d1117; }
        body { background: var(--bg); color: #c9d1d9; font-family: sans-serif; margin: 0; padding: 20px; }
        header { border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .info-row { display: flex; justify-content: space-between; align-items: center; }
        .filter-bar { display: flex; gap: 8px; margin-top: 15px; }
        .btn { padding: 8px 15px; border-radius: 6px; cursor: pointer; border: 1px solid #444; background: #21262d; color: white; transition: 0.2s; }
        .active-all { border-color: #f0f6fc; }
        .active-mc { border-color: var(--mc); color: var(--mc); }
        .active-val { border-color: var(--val); color: var(--val); }
        .active-hsr { border-color: var(--hsr); color: var(--hsr); }
        .btn-refresh { background: #238636; border: none; font-weight: bold; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; text-decoration: none; color: inherit; display: block; border-left: 4px solid transparent; }
        .card[data-game="鸣潮"] { border-left-color: var(--mc); }
        .card[data-game="无畏契约"] { border-left-color: var(--val); }
        .card[data-game="星铁"] { border-left-color: var(--hsr); }
        .title { font-size: 14px; font-weight: bold; margin-bottom: 10px; height: 40px; overflow: hidden; }
        .time { font-size: 11px; color: #8b949e; }
    </style>
</head>
<body>
<header>
    <div class="info-row">
        <div>
            <h2 style="margin:0;">📡 2026 官网动态站</h2>
            <small id="status">正在同步：鸣潮 | 无畏契约 | 星铁</small>
        </div>
        <button class="btn btn-refresh" onclick="manualRefresh()">立即同步官网数据</button>
    </div>
    <div class="filter-bar">
        <button class="btn active-all" id="btn-all" onclick="filterData('全部')">全部</button>
        <button class="btn" id="btn-mc" onclick="filterData('鸣潮')">只看鸣潮</button>
        <button class="btn" id="btn-val" onclick="filterData('无畏契约')">只看无畏契约</button>
        <button class="btn" id="btn-hsr" onclick="filterData('星铁')">只看星铁</button>
    </div>
</header>
<div class="news-grid" id="container">建立 2026 官方连接中...</div>

<script>
    let allNews = [];
    async function fetchNews() {
        const status = document.getElementById('status');
        status.innerText = "正在巡逻三大官网...";
        
        // 抓取源：使用 rss2json 转换器，并添加时间戳防止缓存
        const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
        const timestamp = new Date().getTime();
        const rssUrl = `https://www.gamersky.com/rss/news.xml?t=${timestamp}`;

        try {
            const res = await fetch(proxy + encodeURIComponent(rssUrl));
            const data = await res.json();
            if (data.status === 'ok') {
                allNews = data.items.map(item => {
                    const title = item.title;
                    const pubDate = new Date(item.pubDate);
                    // 核心过滤：2026年以后
                    if (pubDate.getFullYear() >= 2026) {
                        let game = "";
                        if (title.includes('鸣潮')) game = "鸣潮";
                        if (title.match(/无畏契约|瓦罗兰特|VALORANT/i)) game = "无畏契约";
                        if (title.match(/星穹铁道|崩铁|HSR/i)) game = "星铁";
                        return game ? { title, link: item.link, date: pubDate, game } : null;
                    }
                    return null;
                }).filter(n => n !== null);
                render(allNews);
                status.innerText = "同步成功：" + new Date().toLocaleTimeString();
            }
        } catch (e) {
            status.innerText = "同步失败，请检查网络";
        }
    }

    function render(data) {
        const container = document.getElementById('container');
        if (data.length === 0) {
            container.innerHTML = '<p style="grid-column:1/-1;text-align:center;">2026年暂无官方新动态更新。</p>';
            return;
        }
        container.innerHTML = data.map(n => `
            <a href="${n.link}" target="_blank" class="card" data-game="${n.game}">
                <div style="font-size:10px;font-weight:bold;margin-bottom:5px;color:var(--${n.game==='鸣潮'?'mc':(n.game==='无畏契约'?'val':'hsr')})">${n.game}</div>
                <div class="title">${n.title}</div>
                <div class="time">${n.date.toLocaleString()}</div>
            </a>
        `).join('');
    }

    function filterData(type) {
        document.querySelectorAll('.btn').forEach(b => b.className = 'btn');
        if(type === '全部') {
            document.getElementById('btn-all').classList.add('active-all');
            render(allNews);
        } else {
            const btnMap = {'鸣潮':'btn-mc','无畏契约':'btn-val','星铁':'btn-hsr'};
            const activeMap = {'鸣潮':'active-mc','无畏契约':'active-val','星铁':'active-hsr'};
            document.getElementById(btnMap[type]).classList.add(activeMap[type]);
            render(allNews.filter(n => n.game === type));
        }
    }

    function manualRefresh() { fetchNews(); }
    fetchNews();
    setInterval(fetchNews, 1800000); // 半小时刷新
</script>
</body>
</html>
