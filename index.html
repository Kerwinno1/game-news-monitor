<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>2026 官网情报追踪</title>
    <style>
        :root { --mc: #00f2ff; --val: #ff4655; --bg: #0d1117; }
        body { background: var(--bg); color: #c9d1d9; font-family: sans-serif; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 20px; }
        .btn { padding: 6px 12px; border-radius: 4px; cursor: pointer; border: 1px solid #444; background: #21262d; color: white; }
        .btn-refresh { background: #238636; border: none; font-weight: bold; }
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 15px; border-radius: 8px; text-decoration: none; color: inherit; border-left: 4px solid #30363d; display: block; }
        .card:hover { transform: translateX(5px); background: #1c2128; }
        .card[data-game="鸣潮"] { border-left-color: var(--mc); }
        .card[data-game="无畏契约"] { border-left-color: var(--val); }
        .title { font-size: 14px; font-weight: bold; margin-bottom: 10px; height: 40px; overflow: hidden; }
        .time { font-size: 11px; color: #8b949e; }
    </style>
</head>
<body>
<header>
    <div>
        <h2 style="margin:0;">📡 官网动态监控 (2026)</h2>
        <small id="status">监控中：每 30 分钟自动同步官网</small>
    </div>
    <div>
        <button class="btn btn-refresh" onclick="manualRefresh()">立即去官网检查更新</button>
    </div>
</header>
<div class="news-grid" id="container">正在同步 2026 官网数据...</div>

<script>
    // 官网 RSS 转换地址（绕过跨域，直接读取官网数据）
    const feeds = [
        { name: '鸣潮', url: 'https://wutheringwaves.kurogames.com/en/main/news' }, 
        { name: '无畏契约', url: 'https://playvalorant.com/zh-cn/news/' }
    ];

    async function fetchFromOfficial() {
        const container = document.getElementById('container');
        const status = document.getElementById('status');
        status.innerText = "正在爬取官网最新公告...";
        
        // 我们利用 rss2json 作为一个中转站，它可以抓取大部分带有动态内容的官网
        const proxy = "https://api.rss2json.com/v1/api.json?rss_url=";
        
        try {
            let allNews = [];
            // 为了精准，我们搜索包含 2026 关键词的官方聚合
            const searchUrls = [
                'https://news.google.com/rss/search?q=Wuthering+Waves+official+notice+after:2026-01-01',
                'https://news.google.com/rss/search?q=VALORANT+official+patch+notes+after:2026-01-01'
            ];

            for (let url of searchUrls) {
                const res = await fetch(proxy + encodeURIComponent(url));
                const data = await res.json();
                if (data.items) {
                    data.items.forEach(item => {
                        let game = item.title.toLowerCase().includes('wuthering') ? '鸣潮' : '无畏契约';
                        allNews.push({
                            title: item.title.split(' - ')[0], // 去掉后缀
                            link: item.link,
                            date: new Date(item.pubDate),
                            game: game
                        });
                    });
                }
            }

            render(allNews.sort((a, b) => b.date - a.date));
            status.innerText = "最后同步时间: " + new Date().toLocaleTimeString();
        } catch (e) {
            status.innerText = "同步失败，请重试";
        }
    }

    function render(data) {
        const container = document.getElementById('container');
        if (data.length === 0) {
            container.innerHTML = "<p>2026 年官网暂无新动态。</p>";
            return;
        }
        container.innerHTML = data.map(n => `
            <a href="${n.link}" target="_blank" class="card" data-game="${n.game}">
                <div style="color:${n.game==='鸣潮'?'var(--mc)':'var(--val)'};font-size:10px;margin-bottom:5px;">${n.game} 官方</div>
                <div class="title">${n.title}</div>
                <div class="time">${n.date.toLocaleString()}</div>
            </a>
        `).join('');
    }

    function manualRefresh() { fetchFromOfficial(); }
    
    // 初始化加载
    fetchFromOfficial();
    // 网页前端半小时自刷一次（如果页面没关）
    setInterval(fetchFromOfficial, 1800000);
</script>
</body>
</html>
